<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <!-- 暖色调渐变 -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8854A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5A3C;stop-opacity:1" />
    </linearGradient>
    <!-- 相机图标渐变 -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8854A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5A3C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 相机图标 -->
  <g transform="translate(8, 10)">
    <rect x="0" y="12" width="36" height="28" rx="4" fill="url(#iconGrad)"/>
    <circle cx="18" cy="26" r="10" fill="#ffffff"/>
    <circle cx="18" cy="26" r="6" fill="url(#iconGrad)"/>
    <circle cx="18" cy="26" r="3" fill="#ffffff"/>
    <rect x="28" y="16" width="8" height="5" rx="1" fill="url(#iconGrad)"/>
    <circle cx="32" cy="14" r="2" fill="url(#iconGrad)"/>
  </g>

  <!-- 文字 -->
  <text x="58" y="38" font-family="PingFang SC, SF Pro Display, -apple-system, sans-serif" font-size="24" font-weight="600" fill="url(#textGrad)" letter-spacing="-0.5">主厨相机</text>

  <!-- 副标题装饰线 -->
  <rect x="58" y="46" width="40" height="2" rx="1" fill="#C8854A" opacity="0.5"/>
</svg>
